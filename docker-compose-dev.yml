version: '3'
services:
  node-app:
    build:
      target: development
      context: .
      args:
       NODE_ENV: development
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development   
    depends_on:
      - mongo
      - redis 
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    depends_on:
      - mongo

 
volumes:
  mongo-data: